  <style>:root{--terracota:#9B4442;--terracota-dark:#7A3432;--nude:#EFD9D7}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(145deg,#171211 0%,#2a1716 48%,#7A3432 100%);color:#fff;display:grid;place-items:center;padding:24px}.card{width:min(560px,100%);text-align:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:38px 28px;box-shadow:0 28px 80px rgba(0,0,0,.28);backdrop-filter:blur(12px)}.logo{width:86px;height:86px;margin:0 auto 18px;display:grid;place-items:center;border-radius:999px;background:rgba(239,217,215,.12);border:1px solid rgba(239,217,215,.28)}.logo img{width:58px;height:58px;object-fit:contain}.eyebrow{letter-spacing:.16em;text-transform:uppercase;font-size:.72rem;color:#EFD9D7;font-weight:700;margin-bottom:10px}h1{font-size:clamp(1.65rem,5vw,2.45rem);line-height:1.05;margin:0 0 12px;font-weight:760}p{margin:0 auto 22px;max-width:42ch;color:rgba(255,255,255,.82);line-height:1.55}.loader{width:46px;height:46px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:#EFD9D7;margin:20px auto;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:999px;background:#EFD9D7;color:#7A3432;text-decoration:none;font-weight:800}.small{margin-top:18px;font-size:.82rem;color:rgba(255,255,255,.62)}</style>

<body>
  <main class="card" aria-live="polite">

    <div class="eyebrow">Agendamento online</div>
    <h1>Direcionando para São Paulo — Tatuapé</h1>
    <p>Você está sendo direcionada para ver os horários disponíveis no nosso sistema de agendamento.</p>
    <div class="loader" aria-hidden="true"></div>
    <a id="continueLink" class="btn" href="https://booksy.com/pt-br/instant-experiences/widget/412683" rel="noopener">Continuar agora</a>
    <div class="small">Se não abrir automaticamente, toque no botão acima.</div>
  </main>
  <script>
    document.documentElement.classList.remove('no-js');document.documentElement.classList.add('js');
    const SC_UNIT={"id": "tatuape", "slug": "sao-paulo-tatuape", "name": "São Paulo — Tatuapé", "platform": "booksy"};
    const SC_DESTINATION="https://booksy.com/pt-br/instant-experiences/widget/412683";
    const SC_BUILD='20260429-booksy-instant-v1';
    const ATTR_KEYS=['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid','gbraid','wbraid','fbclid','msclkid'];
    function readJSON(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch(e){return f}}function writeJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
    function inferReferrerSource(){try{const r=document.referrer;if(!r)return {source:'direct',medium:'none'};const h=new URL(r).hostname.replace(/^www\./,'');if(h.includes('google.'))return {source:'google',medium:'organic'};if(h.includes('bing.'))return {source:'bing',medium:'organic'};if(h.includes('instagram.'))return {source:'instagram',medium:'social'};if(h.includes('facebook.')||h.includes('fb.'))return {source:'facebook',medium:'social'};if(h.includes('tiktok.'))return {source:'tiktok',medium:'social'};return {source:h,medium:'referral'}}catch(e){return {source:'referral',medium:'referral'}}}
    function captureAttribution(){const qs=new URLSearchParams(location.search);const ref=inferReferrerSource();const now=new Date().toISOString();const current={source:qs.get('utm_source')||ref.source,medium:qs.get('utm_medium')||ref.medium,campaign:qs.get('utm_campaign')||'',content:qs.get('utm_content')||'',term:qs.get('utm_term')||'',gclid:qs.get('gclid')||'',fbclid:qs.get('fbclid')||'',msclkid:qs.get('msclkid')||'',landing_page:(readJSON('sc_first_touch',{}).landing_page)||location.pathname,captured_at:now};if(!readJSON('sc_first_touch',null))writeJSON('sc_first_touch',current);writeJSON('sc_last_touch',current);return {first:readJSON('sc_first_touch',current),last:current};}
    const attr=captureAttribution();
    function destinationWithParams(){const dest=new URL(SC_DESTINATION);const qs=new URLSearchParams(location.search);ATTR_KEYS.forEach(k=>{const normalized=k.replace('utm_','');const value=qs.get(k)||attr.last[normalized]||attr.last[k]||'';if(value&&!dest.searchParams.has(k))dest.searchParams.set(k,value);});return dest.toString();}
    const finalUrl=destinationWithParams();document.getElementById('continueLink').href=finalUrl;
    function payload(){return {site:'caracois.com.br',page_path:location.pathname,page_location:location.href,page_title:document.title,channel:'booking',cta_type:'agendar',cta:'agendar_redirect_auto',unidade:SC_UNIT.id,unit_slug:SC_UNIT.slug,unit_name:SC_UNIT.name,destination_platform:SC_UNIT.platform,destination_host:new URL(finalUrl).hostname.replace(/^www\./,''),destination_url_type:'external',build_version:SC_BUILD,source:attr.last.source||'',medium:attr.last.medium||'',campaign:attr.last.campaign||'',first_source:(attr.first||{}).source||'',first_medium:(attr.first||{}).medium||'',landing_page:(attr.first||{}).landing_page||''};}
    function track(name,p){window.dataLayer=window.dataLayer||[];window.dataLayer.push({event:name,...p});try{if(typeof gtag==='function')gtag('event',name,{...p,event_category:'booking',transport_type:'beacon'})}catch(e){}try{if(typeof fbq==='function')fbq('trackCustom',name,{content_name:p.cta,content_category:'booking',unidade:p.unidade,source:p.source,medium:p.medium,campaign:p.campaign})}catch(e){}try{if(typeof clarity==='function'){clarity('event',name);clarity('set','unidade',p.unidade);clarity('set','booking_platform',p.destination_platform)}}catch(e){}}
    const p=payload();track('booking_intent',p);track('cta_click',p);setTimeout(()=>{track('booking_redirect',p);location.href=finalUrl;},800);
  </script>
