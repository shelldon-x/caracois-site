<body>
  <main class="card" aria-live="polite">
    <div class="logo"><img src="/images/logos/logo-agendar.svg?v=20260504-agendar-conversion-logo-final" alt="Studio Caracóis" width="58" height="58" loading="eager" decoding="async" fetchpriority="high"></div>
    <div class="eyebrow">Agendamento online</div>
    <h1>Direcionando para Goiânia — Setor Bueno</h1>
    <p>Você está sendo direcionada para ver os horários disponíveis no nosso sistema de agendamento.</p>
    <div class="loader" aria-hidden="true"></div>
    <a id="continueLink" class="btn" href="https://booksy.com/pt-br/instant-experiences/widget/412674" rel="noopener">Continuar agora</a>
    <div class="small">Se não abrir automaticamente, toque no botão acima.</div>
  </main>
  <script>
    window.SC_AGENDAR_UNIT = {"id": "goiania", "slug": "goiania", "name": "Goiânia — Setor Bueno", "platform": "booksy"};
    window.SC_AGENDAR_DESTINATION = "https://booksy.com/pt-br/instant-experiences/widget/412674";
    window.SC_AGENDAR_BUILD = "20260504-agendar-conversion-logo-final";
  </script>

  <script>
    window.SC_TRACK_AGENDAR_CONVERSION = function(action) {
      try {
        var unit = window.SC_AGENDAR_UNIT || {};
        var payload = {
          event_category: 'agendamento',
          event_label: unit.slug || unit.id || '',
          unidade: unit.id || '',
          unit_slug: unit.slug || '',
          unit_name: unit.name || '',
          platform: unit.platform || '',
          destination: window.SC_AGENDAR_DESTINATION || '',
          action_type: action || 'click',
          build_version: window.SC_AGENDAR_BUILD || ''
        };

        if (typeof gtag === 'function') {
          gtag('event', 'agendar_conversion', payload);
        }

        if (typeof fbq === 'function') {
          fbq('track', 'Lead', {
            content_name: 'agendar_' + (unit.slug || unit.id || 'unidade'),
            content_category: 'agendamento',
            unidade: unit.id || '',
            platform: unit.platform || ''
          });
        }

        if (typeof clarity === 'function') {
          clarity('event', 'agendar_conversion');
          if (unit.id) clarity('set', 'agendar_unidade', unit.id);
          if (unit.platform) clarity('set', 'agendar_platform', unit.platform);
        }

        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push(Object.assign({ event: 'agendar_conversion' }, payload));
      } catch(e) {}
    };

    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('continueLink');
      if (btn) {
        btn.addEventListener('click', function () {
          window.SC_TRACK_AGENDAR_CONVERSION('manual_click');
        });
      }

      setTimeout(function () {
        window.SC_TRACK_AGENDAR_CONVERSION('auto_redirect');
      }, 650);
    });
  </script>
