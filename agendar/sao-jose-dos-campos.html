  <script>
    window.SC_AGENDAR_UNIT = {"id": "sjc", "slug": "sao-jose-dos-campos", "name": "São José dos Campos — Vila Adyana", "platform": "booksy"};
    window.SC_AGENDAR_DESTINATION = "https://booksy.com/pt-br/instant-experiences/widget/412685";
    window.SC_AGENDAR_BUILD = "20260505-agendar-tracking-plus-v1";
  </script>

  <script>
    (function () {
      'use strict';

      window.SC_AGENDAR_PAGE_START = window.SC_AGENDAR_PAGE_START || Date.now();
      window.SC_AGENDAR_CONVERTED = false;
      window.SC_AGENDAR_LEAD_SENT = false;
      window.SC_AGENDAR_ABANDON_SENT = false;

      function safeParseJSON(value, fallback) {
        try { return JSON.parse(value) || fallback; } catch (e) { return fallback; }
      }

      function readStoredAttribution(key) {
        try { return safeParseJSON(localStorage.getItem(key), {}) || {}; } catch (e) { return {}; }
      }

      function normalizeHost(url) {
        try { return new URL(url).hostname.replace(/^www\./, '').toLowerCase(); } catch (e) { return ''; }
      }

      function queryParamsPayload() {
        var qs = new URLSearchParams(window.location.search || '');
        var keys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid','gbraid','wbraid','fbclid','msclkid'];
        var out = {};
        keys.forEach(function (key) { if (qs.get(key)) out[key] = qs.get(key); });
        return out;
      }

      function cleanPayload(payload) {
        var out = {};
        Object.keys(payload || {}).forEach(function (key) {
          var value = payload[key];
          if (value !== undefined && value !== null && value !== '') out[key] = String(value).slice(0, 500);
        });
        return out;
      }

      function buildPayload(action) {
        var unit = window.SC_AGENDAR_UNIT || {};
        var destination = window.SC_AGENDAR_DESTINATION || '';
        var first = readStoredAttribution('sc_first_touch');
        var last = readStoredAttribution('sc_last_touch');
        var utm = queryParamsPayload();
        var now = Date.now();
        var destinationHost = normalizeHost(destination);
        var referrerHost = normalizeHost(document.referrer || '');
        var actionType = action || 'click';
        var eventId = ['agendar', unit.slug || unit.id || 'unidade', actionType, now].join('_').replace(/[^a-zA-Z0-9_\-]/g, '');

        return cleanPayload(Object.assign({
          site: 'caracois.com.br',
          page_type: 'agendar_redirect',
          page_path: window.location.pathname,
          page_location: window.location.href,
          page_title: document.title,
          referrer: document.referrer || '',
          referrer_host: referrerHost,
          event_id: eventId,
          event_category: 'agendamento',
          event_label: unit.slug || unit.id || '',
          channel: 'booking',
          cta_type: 'agendar',
          cta: 'agendar_' + actionType,
          action_type: actionType,
          unidade: unit.id || '',
          unit_slug: unit.slug || '',
          unit_name: unit.name || '',
          platform: unit.platform || '',
          destination_platform: unit.platform || '',
          destination_host: destinationHost,
          destination_url: destination,
          destination_url_type: 'external',
          build_version: window.SC_AGENDAR_BUILD || '20260505-agendar-tracking-plus-v1',
          time_to_action_ms: Math.max(0, now - (window.SC_AGENDAR_PAGE_START || now)),
          viewport_width: window.innerWidth || '',
          viewport_height: window.innerHeight || '',
          screen_width: (window.screen && window.screen.width) || '',
          screen_height: (window.screen && window.screen.height) || '',
          first_source: first.source || '',
          first_medium: first.medium || '',
          first_campaign: first.campaign || '',
          first_landing_page: first.landing_page || '',
          last_source: last.source || '',
          last_medium: last.medium || '',
          last_campaign: last.campaign || '',
          last_landing_page: last.landing_page || '',
          source: last.source || utm.utm_source || '',
          medium: last.medium || utm.utm_medium || '',
          campaign: last.campaign || utm.utm_campaign || ''
        }, utm));
      }

      function pushDataLayer(eventName, payload) {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push(Object.assign({ event: eventName }, payload));
      }

      window.SC_TRACK_AGENDAR_CONVERSION = function(action) {
        var payload = buildPayload(action);
        window.SC_AGENDAR_CONVERTED = true;

        pushDataLayer('agendar_conversion', payload);
        pushDataLayer('generate_lead', payload);

        try {
          if (typeof gtag === 'function') {
            gtag('event', 'agendar_conversion', Object.assign({ transport_type: 'beacon' }, payload));
            gtag('event', 'generate_lead', Object.assign({ transport_type: 'beacon', currency: 'BRL', value: 0 }, payload));
          }
        } catch(e) {}

        try {
          if (typeof fbq === 'function' && !window.SC_AGENDAR_LEAD_SENT) {
            window.SC_AGENDAR_LEAD_SENT = true;
            fbq('track', 'Lead', {
              content_name: 'agendar_' + (payload.unit_slug || payload.unidade || 'unidade'),
              content_category: 'agendamento',
              unidade: payload.unidade || '',
              unit_slug: payload.unit_slug || '',
              platform: payload.platform || '',
              source: payload.source || '',
              medium: payload.medium || '',
              campaign: payload.campaign || ''
            }, { eventID: payload.event_id });
          }
        } catch(e) {}

        try {
          if (typeof pintrk === 'function') {
            pintrk('track', 'lead', {
              lead_type: 'agendar_' + (payload.unit_slug || payload.unidade || 'unidade'),
              event_id: payload.event_id,
              value: 0,
              currency: 'BRL'
            });
          }
        } catch(e) {}

        try {
          if (typeof clarity === 'function') {
            clarity('event', 'agendar_conversion');
            ['unidade','unit_slug','platform','source','medium','campaign'].forEach(function(key) {
              if (payload[key]) clarity('set', 'agendar_' + key, payload[key]);
            });
          }
        } catch(e) {}
      };

      window.SC_TRACK_AGENDAR_ABANDON = function(reason) {
        if (window.SC_AGENDAR_CONVERTED || window.SC_AGENDAR_ABANDON_SENT) return;
        window.SC_AGENDAR_ABANDON_SENT = true;
        var payload = buildPayload(reason || 'abandon');
        pushDataLayer('agendar_abandon', payload);
        try { if (typeof gtag === 'function') gtag('event', 'agendar_abandon', Object.assign({ transport_type: 'beacon' }, payload)); } catch(e) {}
        try { if (typeof clarity === 'function') clarity('event', 'agendar_abandon'); } catch(e) {}
      };

      document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('continueLink');
        if (btn) {
          btn.setAttribute('rel', 'noopener noreferrer');
          btn.addEventListener('click', function () {
            window.SC_TRACK_AGENDAR_CONVERSION('manual_click');
          });
        }

        setTimeout(function () {
          window.SC_TRACK_AGENDAR_CONVERSION('auto_redirect');
        }, 650);
      });

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') window.SC_TRACK_AGENDAR_ABANDON('visibility_hidden');
      });
      window.addEventListener('pagehide', function () { window.SC_TRACK_AGENDAR_ABANDON('pagehide'); });
    })();
  </script>
