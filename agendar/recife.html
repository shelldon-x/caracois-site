<body>
  <main class="card" aria-live="polite">
    <div class="logo">
      <img src="/images/logos/logo-nude.svg" alt="Studio Caracóis" width="92" height="92" decoding="async" fetchpriority="high">
    </div>
    <div class="eyebrow">Agendamento online</div>
    <h1>Direcionando para Recife — Boa Viagem</h1>
    <p>Você está sendo direcionada para ver os horários disponíveis no nosso sistema de agendamento.</p>
    <div class="loader" aria-hidden="true"></div>
    <a id="continueLink" class="btn" href="https://www.salao99.com.br/studio-caracois-especialistas-em-cachos-recife" rel="noopener noreferrer">Continuar agora</a>
    <div class="small">Se não abrir automaticamente, toque no botão acima.</div>
    <div class="meta" aria-label="Informações do redirecionamento">
      <span>Salão99</span>
      <span>Recife</span>
    </div>
  </main>
  <script>
    document.documentElement.classList.remove('no-js');
    document.documentElement.classList.add('js');
    
    const SC_UNIT = {"id": "recife", "slug": "recife", "name": "Recife — Boa Viagem", "platform": "salao99"};
    const SC_DESTINATION = "https://www.salao99.com.br/studio-caracois-especialistas-em-cachos-recife";
    const SC_BUILD = '20260503-agendar-10';
    
    const ATTR_KEYS = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid','gbraid','wbraid','fbclid','msclkid'];
    
    function readJSON(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (e) { return fallback; }
    }
    function writeJSON(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    }
    function normalizeHost(ref) {
      try { return new URL(ref).hostname.replace(/^www\./,'').toLowerCase(); } catch(e) { return ''; }
    }
    function inferReferrerSource() {
      const ref = document.referrer || '';
      if (!ref) return { source:'direct', medium:'none' };
      const host = normalizeHost(ref);
    
      const aiSources = [
        ['chatgpt', ['chatgpt.com','chat.openai.com','openai.com']],
        ['copilot', ['copilot.microsoft.com','bing.com/chat']],
        ['gemini', ['gemini.google.com','bard.google.com']],
        ['deepseek', ['deepseek.com','chat.deepseek.com']],
        ['claude', ['claude.ai','anthropic.com']],
        ['perplexity', ['perplexity.ai']],
        ['grok', ['grok.com','x.ai']],
        ['meta_ai', ['meta.ai']]
      ];
      for (const [source, domains] of aiSources) {
        if (domains.some(domain => host.includes(domain))) return { source, medium:'ai' };
      }
    
      if (host.includes('google.')) return { source:'google', medium:'organic' };
      if (host.includes('bing.')) return { source:'bing', medium:'organic' };
      if (host.includes('instagram.')) return { source:'instagram', medium:'social' };
      if (host.includes('facebook.') || host.includes('fb.')) return { source:'facebook', medium:'social' };
      if (host.includes('tiktok.')) return { source:'tiktok', medium:'social' };
      if (host.includes('youtube.') || host.includes('youtu.be')) return { source:'youtube', medium:'video' };
      if (host.includes('pinterest.')) return { source:'pinterest', medium:'social' };
      if (host.includes('x.com') || host.includes('twitter.')) return { source:'x', medium:'social' };
      if (host.includes('linkedin.')) return { source:'linkedin', medium:'social' };
      if (host.includes('whatsapp.')) return { source:'whatsapp', medium:'referral' };
      return { source: host || 'referral', medium:'referral' };
    }
    function captureAttribution() {
      const qs = new URLSearchParams(location.search);
      const ref = inferReferrerSource();
      const now = new Date().toISOString();
      const existingFirst = readJSON('sc_first_touch', null);
    
      const current = {
        source: qs.get('utm_source') || ref.source,
        medium: qs.get('utm_medium') || ref.medium,
        campaign: qs.get('utm_campaign') || '',
        content: qs.get('utm_content') || '',
        term: qs.get('utm_term') || '',
        gclid: qs.get('gclid') || '',
        gbraid: qs.get('gbraid') || '',
        wbraid: qs.get('wbraid') || '',
        fbclid: qs.get('fbclid') || '',
        msclkid: qs.get('msclkid') || '',
        landing_page: (existingFirst && existingFirst.landing_page) || location.pathname,
        captured_at: now
      };
    
      if (!existingFirst) writeJSON('sc_first_touch', current);
      writeJSON('sc_last_touch', current);
      return { first: readJSON('sc_first_touch', current), last: current };
    }
    
    const attr = captureAttribution();
    
    function destinationWithParams() {
      const dest = new URL(SC_DESTINATION);
      const qs = new URLSearchParams(location.search);
    
      ATTR_KEYS.forEach(key => {
        const normalized = key.replace('utm_','');
        const value = qs.get(key) || attr.last[normalized] || attr.last[key] || '';
        if (value && !dest.searchParams.has(key)) dest.searchParams.set(key, value);
      });
    
      if (!dest.searchParams.has('utm_source')) dest.searchParams.set('utm_source', attr.last.source || 'direct');
      if (!dest.searchParams.has('utm_medium')) dest.searchParams.set('utm_medium', attr.last.medium || 'none');
      if (!dest.searchParams.has('utm_campaign') && attr.last.campaign) dest.searchParams.set('utm_campaign', attr.last.campaign);
      dest.searchParams.set('utm_content', dest.searchParams.get('utm_content') || `agendar_${SC_UNIT.slug}`);
    
      return dest.toString();
    }
    
    const finalUrl = destinationWithParams();
    const continueLink = document.getElementById('continueLink');
    if (continueLink) {
      continueLink.href = finalUrl;
      continueLink.addEventListener('click', () => track('booking_redirect_manual', payload('agendar_redirect_manual')));
    }
    
    function payload(cta = 'agendar_redirect_auto') {
      const finalHost = new URL(finalUrl).hostname.replace(/^www\./,'');
      return {
        site:'caracois.com.br',
        build_version:SC_BUILD,
        page_path:location.pathname,
        page_location:location.href,
        page_title:document.title,
        channel:'booking',
        cta_type:'agendar',
        cta,
        unidade:SC_UNIT.id,
        unit_slug:SC_UNIT.slug,
        unit_name:SC_UNIT.name,
        destination_platform:SC_UNIT.platform,
        destination_host:finalHost,
        destination_url_type:'external',
        source:attr.last.source || '',
        medium:attr.last.medium || '',
        campaign:attr.last.campaign || '',
        content:attr.last.content || '',
        term:attr.last.term || '',
        first_source:(attr.first || {}).source || '',
        first_medium:(attr.first || {}).medium || '',
        landing_page:(attr.first || {}).landing_page || ''
      };
    }
    
    function track(name, params) {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ event:name, ...params });
    
      try {
        if (typeof gtag === 'function') {
          gtag('event', name, { ...params, event_category:'booking', transport_type:'beacon' });
        }
      } catch(e) {}
    
      try {
        if (typeof fbq === 'function') {
          fbq('trackCustom', name, {
            content_name:params.cta,
            content_category:'booking',
            unidade:params.unidade,
            source:params.source,
            medium:params.medium,
            campaign:params.campaign
          });
        }
      } catch(e) {}
    
      try {
        if (typeof clarity === 'function') {
          clarity('event', name);
          clarity('set', 'unidade', params.unidade);
          clarity('set', 'booking_platform', params.destination_platform);
          clarity('set', 'source_medium', `${params.source}/${params.medium}`);
        }
      } catch(e) {}
    }
    
    const p = payload();
    track('booking_intent', p);
    track('cta_click', p);
    
    setTimeout(() => {
      track('booking_redirect', payload('agendar_redirect_auto'));
      location.href = finalUrl;
    }, 900);
  </script>
