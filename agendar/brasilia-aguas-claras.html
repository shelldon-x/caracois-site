    const SC_DESTINATION="https://www.salao99.com.br/studio-caracois-especialistas-em-cachos-aguas-claras";
    const ATTR_KEYS=['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid','gbraid','wbraid','fbclid','msclkid'];
    function readJSON(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch(e){return f}}function writeJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
    function inferReferrerSource(){try{const r=document.referrer;if(!r)return {source:'direct',medium:'none'};const h=new URL(r).hostname.replace(/^www\./,'');if(h.includes('google.'))return {source:'google',medium:'organic'};if(h.includes('bing.'))return {source:'bing',medium:'organic'};if(h.includes('instagram.'))return {source:'instagram',medium:'social'};if(h.includes('facebook.')||h.includes('fb.'))return {source:'facebook',medium:'social'};if(h.includes('tiktok.'))return {source:'tiktok',medium:'social'};return {source:h,medium:'referral'}}catch(e){return {source:'referral',medium:'referral'}}}
    function captureAttribution(){const qs=new URLSearchParams(location.search);const ref=inferReferrerSource();const now=new Date().toISOString();const current={source:qs.get('utm_source')||ref.source,medium:qs.get('utm_medium')||ref.medium,campaign:qs.get('utm_campaign')||'',content:qs.get('utm_content')||'',term:qs.get('utm_term')||'',gclid:qs.get('gclid')||'',fbclid:qs.get('fbclid')||'',msclkid:qs.get('msclkid')||'',landing_page:(readJSON('sc_first_touch',{}).landing_page)||location.pathname,captured_at:now};if(!readJSON('sc_first_touch',null))writeJSON('sc_first_touch',current);writeJSON('sc_last_touch',current);return {first:readJSON('sc_first_touch',current),last:current};}
