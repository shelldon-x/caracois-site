<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28" role="img" aria-label="Amazon">
  <!-- Fundo branco -->
  <rect width="100" height="100" rx="12" fill="#FFFFFF"/>

  <!-- Wordmark "amazon" em preto -->
  <text x="50" y="52" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#221F1F" text-anchor="middle" letter-spacing="-0.5">amazon</text>

  <!-- Seta sorriso laranja (de "a" até "z") -->
  <path d="M24 62 Q50 78 76 62" stroke="#FF9900" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Ponta da seta -->
  <path d="M72 58 L76 62 L70 65" stroke="#FF9900" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
